name: Deploy to cPanel via SSH

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Sync and Deploy
    runs-on: ubuntu-latest
    steps:
      - name: SSH and Deploy
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.CPANEL_SERVER }}
          username: ${{ secrets.CPANEL_USERNAME }}
          key: ${{ secrets.CPANEL_SSH_KEY }}
          port: 22
          script: |
            cd repositories/acroshub-connect
            git pull origin main
            /bin/cp -R dist/* /home/${{ secrets.CPANEL_USERNAME }}/public_html/acroshub.com
            /bin/cp dist/.htaccess /home/${{ secrets.CPANEL_USERNAME }}/public_html/acroshub.com/.htaccess
