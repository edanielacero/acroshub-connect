name: Deploy to cPanel via SSH

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Sync and Force Deploy
    runs-on: ubuntu-latest
    steps:
      - name: SSH, Reset and Force Copy
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.CPANEL_SERVER }}
          username: ${{ secrets.CPANEL_USERNAME }}
          key: ${{ secrets.CPANEL_SSH_KEY }}
          port: 22
          script: |
            echo "--- Iniciando Despliegue Automático ---"
            cd /home/${{ secrets.CPANEL_USERNAME }}/repositories/acroshub-connect || exit 1
            
            echo "--- Limpiando y Actualizando Repositorio ---"
            git fetch --all
            git reset --hard origin/main
            
            echo "--- Desplegando archivos a public_html/acroshub.com ---"
            /bin/cp -rf dist/* /home/${{ secrets.CPANEL_USERNAME }}/public_html/acroshub.com/
            /bin/cp -f dist/.htaccess /home/${{ secrets.CPANEL_USERNAME }}/public_html/acroshub.com/.htaccess
            
            echo "--- ¡Despliegue finalizado con éxito! ---"
